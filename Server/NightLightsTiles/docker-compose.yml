services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-immersivemap}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-immersivemap-local-dev}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./data/minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-immersivemap}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-immersivemap-local-dev}
      NIGHT_LIGHTS_BUCKET: ${NIGHT_LIGHTS_BUCKET:-night-lights}
    entrypoint: ["/bin/sh", "/init/init-minio.sh"]
    volumes:
      - ./init:/init:ro
      - ./seed:/seed:ro
      - ../../ImmersiveMap/Render/EarthScene/Resources/NightLightsTiles:/bundled-night-lights:ro
